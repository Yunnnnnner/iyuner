<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>跳动の小云朵</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(180deg, #a8d8ea 0%, #d4f1f4 50%, #f7f9fc 100%);
            font-family: 'Noto Serif SC', serif;
            touch-action: none;
        }
        
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        
        #ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .watercolor-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) scale(1); }
            70% { opacity: 1; transform: translateX(-50%) scale(1.1); }
            100% { opacity: 0; transform: translateX(-50%) scale(0.9); }
        }
        
        .hud-container {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .hud-left, .hud-right {
            display: flex;
            gap: 15px;
        }
        
        .hud-item {
            padding: 10px 18px;
            color: #4a6a7a;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 1px;
        }
        
        .hud-value {
            color: #2a4a5a;
            font-weight: 600;
            font-size: 18px;
            margin-left: 5px;
        }
        
        .controls-hint {
            position: absolute;
            bottom: 25px;
            left: 25px;
            color: rgba(74, 106, 122, 0.7);
            font-size: 12px;
            line-height: 1.8;
            font-weight: 300;
            letter-spacing: 1px;
        }
        
        .mobile-controls {
            display: none;
            position: absolute;
            bottom: 30px;
            left: 30px;
            right: 30px;
            pointer-events: auto;
        }
        
        .mobile-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .mobile-btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(74, 106, 122, 0.9);
            font-size: 24px;
            user-select: none;
            touch-action: manipulation;
            backdrop-filter: blur(5px);
        }
        
        .mobile-btn:active {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(0.95);
        }
        
        .mobile-jump {
            width: 90px;
            height: 90px;
            background: rgba(255, 220, 150, 0.3);
            border-color: rgba(255, 200, 100, 0.5);
        }
        
        .start-screen, .level-complete, .game-over, .game-complete, .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #a8d8ea 0%, #d4f1f4 50%, #f7f9fc 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: auto;
        }
        
        .level-complete, .game-over, .game-complete, .loading {
            display: none;
        }
        
        .start-screen::before, .level-complete::before, .game-over::before, .game-complete::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(255, 255, 255, 0.4) 0%, transparent 40%),
                radial-gradient(ellipse at 80% 70%, rgba(212, 241, 244, 0.5) 0%, transparent 40%);
            pointer-events: none;
        }
        
        .cloud-decoration {
            position: absolute;
            background: radial-gradient(ellipse, rgba(255, 255, 255, 0.6) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(15px);
        }
        
        .start-content, .complete-content, .over-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }
        
        .game-title {
            color: #5a8aa0;
            font-size: 64px;
            font-weight: 400;
            letter-spacing: 8px;
            margin-bottom: 15px;
            text-shadow: 0 4px 20px rgba(168, 216, 234, 0.6);
            font-family: 'ZCOOL KuaiLe', cursive;
        }
        
        .subtitle {
            margin-bottom: 60px;
            margin-top: 15px;
        }
        
        .subtitle-cn {
            color: rgba(74, 106, 122, 0.8);
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 6px;
            margin-bottom: 8px;
        }
        
        .subtitle-en {
            color: rgba(74, 106, 122, 0.6);
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 3px;
        }
        
        .level-title {
            color: #4a6a7a;
            font-size: 42px;
            font-weight: 300;
            letter-spacing: 8px;
            margin-bottom: 20px;
        }
        
        .score-display {
            color: #5a7a8a;
            font-size: 20px;
            margin-bottom: 40px;
            line-height: 2;
        }
        
        .btn-primary {
            padding: 16px 50px;
            background: linear-gradient(135deg, rgba(255, 220, 150, 0.9) 0%, rgba(255, 200, 120, 0.85) 100%);
            border: none;
            border-radius: 50px;
            color: #4a5a6a;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 25px rgba(255, 200, 100, 0.3);
            font-family: 'Noto Serif SC', serif;
            pointer-events: auto;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 210, 130, 0.4);
        }
        
        .btn-secondary {
            padding: 14px 40px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(168, 216, 234, 0.5);
            border-radius: 50px;
            color: #5a7a8a;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Serif SC', serif;
            margin-top: 15px;
            pointer-events: auto;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.45);
            border-color: rgba(168, 216, 234, 0.7);
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(168, 216, 234, 0.3);
            border-top-color: rgba(168, 216, 234, 0.9);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #5a7a8a;
            margin-top: 20px;
            font-size: 14px;
            letter-spacing: 3px;
        }
        
        .tutorial {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(74, 106, 122, 0.7);
            font-size: 13px;
            text-align: center;
            line-height: 1.8;
        }
        
        @media (max-width: 768px) {
            .controls-hint {
                display: none;
            }
            
            .mobile-controls {
                display: block;
            }
            
            .hud-container {
                top: 15px;
                left: 15px;
                right: 15px;
            }
            
            .hud-item {
                padding: 8px 12px;
                font-size: 12px;
            }
            
            .hud-value {
                font-size: 15px;
            }
            
            .game-title {
                font-size: 40px;
                letter-spacing: 8px;
            }
            
            .subtitle {
                font-size: 13px;
                letter-spacing: 4px;
            }
            
            .level-title {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div class="hud-container">
            <div class="hud-left">
                <div class="hud-item watercolor-panel">
                    分数 <span class="hud-value" id="score">0</span>
                </div>
                <div class="hud-item watercolor-panel">
                    关卡 <span class="hud-value" id="level">1</span>
                </div>
                <div class="hud-item watercolor-panel">
                    时间 <span class="hud-value" id="time">120</span>
                </div>
            </div>
            <div class="hud-right">
                <div class="hud-item watercolor-panel">
                    <span id="lifeIcons">❤❤❤❤❤</span>
                </div>
                <div class="hud-item watercolor-panel">
                    ⭐ <span class="hud-value" id="stars">0</span>
                </div>
                <div class="hud-item watercolor-panel">
                    🪶 <span class="hud-value" id="feathers">0</span>
                </div>
            </div>
        </div>
        
        <div class="controls-hint">
            <div>A / ← · 向左移动</div>
            <div>D / → · 向右移动</div>
            <div>空格 / W / ↑ · 跳跃</div>
            <div>踩踏敌人头部可消灭它们</div>
        </div>
        
        <div class="mobile-controls">
            <div class="mobile-row">
                <div style="display: flex; gap: 15px;">
                    <div class="mobile-btn" id="mobileLeft">←</div>
                    <div class="mobile-btn" id="mobileRight">→</div>
                </div>
                <div class="mobile-btn mobile-jump" id="mobileJump">跳</div>
            </div>
        </div>
    </div>
    
    <div class="start-screen" id="startScreen">
        <div class="cloud-decoration" style="width: 350px; height: 180px; top: 8%; left: -80px;"></div>
        <div class="cloud-decoration" style="width: 280px; height: 140px; top: 25%; right: -40px;"></div>
        <div class="cloud-decoration" style="width: 450px; height: 220px; bottom: 15%; left: 15%;"></div>
        
        <div class="start-content">
            <h1 class="game-title">跳动の小云朵</h1>
            <div class="subtitle">
                <div class="subtitle-cn">在云间跳跃冒险</div>
                <div class="subtitle-en">Little Jumping Cloud</div>
            </div>
            <button class="btn-primary" id="startBtn">开始冒险</button>
            
            <div class="tutorial">
                <div>在云间跳跃，收集星星</div>
                <div>踩踏墨水怪，抵达光之门</div>
            </div>
        </div>
    </div>
    
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在进入云海</div>
    </div>
    
    <div class="level-complete" id="levelComplete">
        <div class="cloud-decoration" style="width: 300px; height: 150px; top: 20%; left: 10%;"></div>
        <div class="cloud-decoration" style="width: 400px; height: 200px; bottom: 20%; right: 5%;"></div>
        
        <div class="complete-content">
            <h2 class="level-title">关卡完成</h2>
            <div class="score-display">
                <div>收集星星: <span id="levelStars">0</span></div>
                <div>当前分数: <span id="levelScore">0</span></div>
            </div>
            <button class="btn-primary" id="nextLevelBtn">下一关</button>
        </div>
    </div>
    
    <div class="game-over" id="gameOver">
        <div class="over-content">
            <h2 class="level-title">游戏结束</h2>
            <div class="score-display">
                <div>最终分数: <span id="finalScore">0</span></div>
            </div>
            <button class="btn-primary" id="retryBtn">重新开始</button>
            <button class="btn-secondary" onclick="location.reload()">返回主菜单</button>
        </div>
    </div>
    
    <div class="game-complete" id="gameComplete">
        <div class="cloud-decoration" style="width: 500px; height: 250px; top: 10%; left: -100px;"></div>
        <div class="cloud-decoration" style="width: 400px; height: 200px; top: 30%; right: -50px;"></div>
        <div class="cloud-decoration" style="width: 600px; height: 300px; bottom: 10%; left: 20%;"></div>
        
        <div class="complete-content">
            <h2 class="game-title">恭喜通关</h2>
            <div class="subtitle">你已完成所有关卡</div>
            <div class="score-display">
                <div>总分数: <span id="totalScore">0</span></div>
                <div>总星星: <span id="totalStars">0</span></div>
            </div>
            <button class="btn-primary" onclick="location.reload()">再次挑战</button>
        </div>
    </div>

    <script src="js/platformer.js"></script>
</body>
</html>
